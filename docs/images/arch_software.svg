<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <marker id="arrow_sw" markerWidth="10" markerHeight="10" refX="0" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333" />
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="600" height="400" fill="#ffffff" />
  
  <!-- Title -->
  <text x="300" y="40" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle" fill="#333">Vibe GPU Software Stack</text>

  <!-- Layer 2: CUDA Frontend (Renumbered from 3) -->
  <rect x="100" y="80" width="400" height="80" rx="5" fill="#d4edda" stroke="#28a745" stroke-width="2"/>
  <text x="300" y="110" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle" fill="#155724">Level 2: CUDA-like Frontend</text>
  <text x="300" y="135" font-family="Arial" font-size="14" text-anchor="middle" fill="#155724">@cuda.jit, blockIdx, threadIdx</text>
  <text x="300" y="150" font-family="Arial" font-size="12" text-anchor="middle" fill="#155724">tools/vibe_cuda.py</text>

  <!-- Arrow -->
  <line x1="300" y1="160" x2="300" y2="200" stroke="#333" stroke-width="2" marker-end="url(#arrow_sw)" />

  <!-- Layer 1: Assembler -->
  <rect x="100" y="200" width="400" height="80" rx="5" fill="#cce5ff" stroke="#007bff" stroke-width="2"/>
  <text x="300" y="230" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle" fill="#004085">Level 1: Assembler &amp; ISA</text>
  <text x="300" y="255" font-family="Arial" font-size="14" text-anchor="middle" fill="#004085">asm.add(), asm.ldi(), Vibe ISA</text>
  <text x="300" y="270" font-family="Arial" font-size="12" text-anchor="middle" fill="#004085">tools/assembler.py</text>

  <!-- Arrow -->
  <line x1="300" y1="280" x2="300" y2="320" stroke="#333" stroke-width="2" marker-end="url(#arrow_sw)" />

  <!-- Hardware / Binary -->
  <rect x="150" y="320" width="300" height="60" rx="5" fill="#e2e6ea" stroke="#333" stroke-width="2"/>
  <text x="300" y="345" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">Machine Code (Hex)</text>
  <text x="300" y="365" font-family="Arial" font-size="14" text-anchor="middle" fill="#333">tests/program.hex</text>
</svg>