<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrow_hw" markerWidth="10" markerHeight="10" refX="0" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333" />
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa" />
  
  <!-- Title -->
  <text x="400" y="40" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle" fill="#333">Vibe GPU Hardware Architecture</text>

  <!-- Main Memory -->
  <rect x="250" y="500" width="300" height="60" rx="5" fill="#e9ecef" stroke="#333" stroke-width="2"/>
  <text x="400" y="535" font-family="Arial" font-size="16" text-anchor="middle" fill="#333">Unified Shared Memory (4KB)</text>

  <!-- Interconnect Bus -->
  <line x1="100" y1="450" x2="700" y2="450" stroke="#333" stroke-width="4" />
  <line x1="400" y1="450" x2="400" y2="500" stroke="#333" stroke-width="4" marker-end="url(#arrow_hw)" />

  <!-- SM Cores Container -->
  <rect x="50" y="80" width="700" height="350" rx="10" fill="none" stroke="#666" stroke-dasharray="5,5" />
  <text x="400" y="70" font-family="Arial" font-size="14" fill="#666" text-anchor="middle">4x Streaming Multiprocessors (SMs)</text>

  <!-- SM 0 (Detailed) -->
  <rect x="80" y="100" width="200" height="300" rx="5" fill="#fff" stroke="#007bff" stroke-width="2"/>
  <text x="180" y="125" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#007bff">SM Core 0</text>
  
  <!-- Inside SM 0 -->
  <!-- Warp Scheduler -->
  <rect x="100" y="140" width="160" height="30" rx="3" fill="#e3f2fd" stroke="#007bff"/>
  <text x="180" y="160" font-family="Arial" font-size="12" text-anchor="middle">Warp Scheduler (RR)</text>
  
  <!-- PC & Mask Table -->
  <rect x="100" y="180" width="75" height="40" rx="3" fill="#fff3cd" stroke="#ffc107"/>
  <text x="137.5" y="205" font-family="Arial" font-size="10" text-anchor="middle">PC Table</text>
  
  <rect x="185" y="180" width="75" height="40" rx="3" fill="#fff3cd" stroke="#ffc107"/>
  <text x="222.5" y="205" font-family="Arial" font-size="10" text-anchor="middle">SIMT Stack</text>

  <!-- Pipeline -->
  <rect x="100" y="230" width="160" height="100" rx="3" fill="#f8f9fa" stroke="#28a745"/>
  <text x="180" y="245" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="#28a745">Pipeline (5-Stage)</text>
  <text x="180" y="265" font-family="Arial" font-size="10" text-anchor="middle">IF | ID | EX | MEM | WB</text>
  
  <!-- Execution Units -->
  <rect x="110" y="280" width="60" height="30" rx="2" fill="#dc3545" stroke="none" opacity="0.2"/>
  <text x="140" y="300" font-family="Arial" font-size="10" text-anchor="middle" fill="#dc3545">ALU (Int)</text>
  
  <rect x="180" y="280" width="60" height="30" rx="2" fill="#6f42c1" stroke="none" opacity="0.2"/>
  <text x="210" y="300" font-family="Arial" font-size="10" text-anchor="middle" fill="#6f42c1">FPU (FP8)</text>

  <!-- Register File -->
  <rect x="100" y="340" width="160" height="40" rx="3" fill="#e2e6ea" stroke="#333"/>
  <text x="180" y="365" font-family="Arial" font-size="12" text-anchor="middle">Register File (32x)</text>

  <!-- L1 Cache -->
  <rect x="100" y="400" width="160" height="30" rx="3" fill="#17a2b8" stroke="#17a2b8" fill-opacity="0.2"/>
  <text x="180" y="420" font-family="Arial" font-size="12" text-anchor="middle" fill="#17a2b8">L1 Cache (Banked)</text>

  <!-- Connection to Bus -->
  <line x1="180" y1="430" x2="180" y2="450" stroke="#333" stroke-width="2" />


  <!-- SM 1 (Simplified) -->
  <rect x="300" y="100" width="140" height="300" rx="5" fill="#fff" stroke="#666" stroke-width="2"/>
  <text x="370" y="250" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#666">SM Core 1</text>
  <line x1="370" y1="400" x2="370" y2="450" stroke="#333" stroke-width="2" />

  <!-- SM 2 (Simplified) -->
  <rect x="460" y="100" width="140" height="300" rx="5" fill="#fff" stroke="#666" stroke-width="2"/>
  <text x="530" y="250" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#666">SM Core 2</text>
  <line x1="530" y1="400" x2="530" y2="450" stroke="#333" stroke-width="2" />

  <!-- SM 3 (Simplified) -->
  <rect x="620" y="100" width="140" height="300" rx="5" fill="#fff" stroke="#666" stroke-width="2"/>
  <text x="690" y="250" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#666">SM Core 3</text>
  <line x1="690" y1="400" x2="690" y2="450" stroke="#333" stroke-width="2" />
</svg>